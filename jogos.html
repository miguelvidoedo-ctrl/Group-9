<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Jogos Interativos</title>

<style>

/* BASE */
body{
margin:0;
font-family:Arial;
background:#f4f6f7;
}

.navbar{
background:#2c7a4b;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

.section{
padding:40px;
max-width:1000px;
margin:auto;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
border:none;
background:#2c7a4b;
color:white;
border-radius:5px;
}

button:hover{
background:#1f5d39;
}

/* SOPA */
#grid{
display:grid;
grid-template-columns:repeat(10,35px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.letra{
width:35px;
height:35px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #ccc;
cursor:pointer;
background:white;
}

.selecionado{
background:#2c7a4b;
color:white;
}

</style>

</head>

<body>

<header class="navbar">
<h2>Jogos Interativos</h2>
<nav>
<a href="index.html">Início</a>
<a href="lei.html">Lei</a>
<a href="impacto.html">Impacto</a>
<a href="peticao.html">Petição</a>
</nav>
</header>

<!-- SIMULADOR -->
<section class="section">

<h2>Simulador de Fábrica</h2>

<h1 id="ruido">50 dB</h1>
<h2 id="dinheiro">€1000</h2>

<button onclick="produzir()">Produzir</button>
<button onclick="isolamento()">Isolar</button>

<p id="estado"></p>

</section>

<!-- SOPA -->
<section class="section">

<h2>Sopa de Letras (encontra "RUIDO")</h2>

<div id="grid"></div>
<p id="resultadoSopa"></p>

</section>

<!-- CAÇA PALAVRAS -->
<section class="section">

<h2>Caça-Palavras</h2>

<input id="inputPalavra" placeholder="Ex: ruido">
<button onclick="verificarPalavra()">Verificar</button>

<p id="resPalavra"></p>

</section>

<!-- QUIZ -->
<section class="section">

<h2>Quiz</h2>

<p id="pergunta"></p>
<div id="respostas"></div>

<p id="pontuacao"></p>

<button onclick="reiniciarQuiz()">Reiniciar Quiz</button>

</section>

<script>

//////////////////////
// SIMULADOR
//////////////////////

let ruido = 50
let dinheiro = 1000

function atualizar(){
document.getElementById("ruido").innerText = ruido + " dB"
document.getElementById("dinheiro").innerText = "€" + dinheiro
}

function produzir(){

ruido += Math.floor(Math.random()*15)
dinheiro += 200

if(ruido > 85){
document.getElementById("estado").innerText = "❌ Fábrica fechada por excesso de ruído!"
reset()
}

atualizar()
}

function isolamento(){

dinheiro -= 150
ruido -= Math.floor(Math.random()*20)

if(ruido < 0) ruido = 0

if(dinheiro < 0){
document.getElementById("estado").innerText = "❌ Falência!"
reset()
}

atualizar()
}

function reset(){
ruido = 50
dinheiro = 1000
}

//////////////////////
// SOPA DE LETRAS
//////////////////////

let palavra = "RUIDO"
let tamanho = 10
let letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
let grid = document.getElementById("grid")

let matriz = []

for(let i=0;i<tamanho;i++){
matriz[i]=[]
for(let j=0;j<tamanho;j++){
matriz[i][j]=letras[Math.floor(Math.random()*26)]
}
}

let linha = Math.floor(Math.random()*tamanho)
let col = Math.floor(Math.random()*(tamanho - palavra.length))

for(let i=0;i<palavra.length;i++){
matriz[linha][col+i]=palavra[i]
}

let selecionadas = ""

for(let i=0;i<tamanho;i++){
for(let j=0;j<tamanho;j++){

let div = document.createElement("div")
div.innerText = matriz[i][j]
div.className = "letra"

div.onclick = function(){

div.classList.toggle("selecionado")

if(div.classList.contains("selecionado")){
selecionadas += div.innerText
}else{
selecionadas = selecionadas.replace(div.innerText,"")
}

if(selecionadas.includes(palavra)){
document.getElementById("resultadoSopa").innerText = "✔ Palavra encontrada!"
}

}

grid.appendChild(div)

}
}

//////////////////////
// CAÇA PALAVRAS
//////////////////////

function verificarPalavra(){

let input = document.getElementById("inputPalavra").value.toUpperCase()

let palavras = ["RUIDO","AMBIENTE","INDUSTRIA","SUSTENTAVEL"]

if(palavras.includes(input)){
document.getElementById("resPalavra").innerText = "✔ Correto!"
}else{
document.getElementById("resPalavra").innerText = "❌ Errado"
}

}

//////////////////////
// QUIZ
//////////////////////

let perguntas = [
{
q:"Qual o limite seguro de ruído?",
a:["70 dB","85 dB","100 dB","120 dB"],
c:1
},
{
q:"Quem fiscaliza?",
a:["APA","ONU","Google","Netflix"],
c:0
},
{
q:"O ruído pode causar?",
a:["Fome","Surdez","Sono extra","Nada"],
c:1
},
{
q:"A lei cria?",
a:["Imposto","Certificação","Prisão","Multa automática"],
c:1
},
{
q:"O objetivo principal é?",
a:["Lucro","Política","Saúde e ambiente","Nada"],
c:2
}
]

let atual = 0
let pontos = 0

function mostrarPergunta(){

let p = perguntas[atual]

document.getElementById("pergunta").innerText = p.q

let div = document.getElementById("respostas")
div.innerHTML = ""

p.a.forEach((txt,i)=>{

let btn = document.createElement("button")
btn.innerText = txt

btn.onclick = function(){

if(i===p.c) pontos++

atual++

if(atual < perguntas.length){
mostrarPergunta()
}else{
document.getElementById("pontuacao").innerText =
"Pontuação: " + pontos + "/" + perguntas.length
}

}

div.appendChild(btn)

})

}

function reiniciarQuiz(){
atual = 0
pontos = 0
document.getElementById("pontuacao").innerText = ""
mostrarPergunta()
}

mostrarPergunta()

</script>

</body>
</html>
