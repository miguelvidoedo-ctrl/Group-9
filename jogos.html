<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogos Educativos</title>
<link rel="stylesheet" href="style.css">

<style>

/* sopa de letras */
#grid{
display:grid;
grid-template-columns:repeat(12,35px);
gap:4px;
justify-content:center;
margin:20px 0;
}

.letra{
width:35px;
height:35px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #ccc;
cursor:pointer;
background:white;
}

.sel{
background:#2c7a4b;
color:white;
}

/* quiz */
#respostas button{
display:block;
margin:5px auto;
}

</style>

</head>

<body>

<header class="navbar">
<h1>Jogos Interativos</h1>

<nav>
<a href="index.html">Início</a>
<a href="lei.html">Lei</a>
<a href="impacto.html">Impacto</a>
<a href="peticao.html">Petição</a>
<a href="jogos.html">Jogos</a>
</nav>
</header>

<section class="section">

<!-- 🔤 SOPA DE LETRAS -->

<h2>Sopa de Letras</h2>

<p>Encontra estas palavras: <strong>RUIDO, AMBIENTE, INDUSTRIA, SUSTENTAVEL</strong></p>

<div id="grid"></div>
<p id="resultado"></p>

<hr>

<!-- 🧠 QUIZ -->

<h2>Quiz</h2>

<p id="pergunta"></p>
<div id="respostas"></div>
<p id="pontuacao"></p>

<hr>

<!-- ⚖️ JOGO DE DECISÃO -->

<h2>Decisões Industriais</h2>

<p id="situacao"></p>
<div id="opcoes"></div>
<p id="resultadoJogo"></p>

<hr>

<!-- 🧠 MEMÓRIA -->

<h2>Memória</h2>

<button onclick="startMem()">Começar</button>
<p id="mem"></p>

</section>

<script>

//////////////////////////
// 🔤 SOPA DE LETRAS
//////////////////////////

let palavras = ["RUIDO","AMBIENTE","INDUSTRIA","SUSTENTAVEL"]
let letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
let tamanho = 12

let grid = document.getElementById("grid")
let selecionadas = ""

// gerar grelha
for(let i=0;i<tamanho*tamanho;i++){

let div = document.createElement("div")
div.className="letra"
div.innerText = letras[Math.floor(Math.random()*26)]

div.onclick = function(){
div.classList.toggle("sel")
selecionadas += div.innerText

palavras.forEach(p=>{
if(selecionadas.includes(p)){
document.getElementById("resultado").innerText="Encontraste: "+p
}
})
}

grid.appendChild(div)

}

//////////////////////////
// 🧠 QUIZ
//////////////////////////

let perguntas = [
{q:"Qual o limite de ruído seguro?",a:["70","85","100"],c:1},
{q:"Quem fiscaliza?",a:["APA","ONU","Google"],c:0},
{q:"O ruído pode causar?",a:["Surdez","Nada","Fome"],c:0},
{q:"A lei cria?",a:["Certificação","Nada","Imposto"],c:0},
{q:"O objetivo é?",a:["Lucro","Ambiente","Nada"],c:1}
]

let atual=0
let pontos=0

function mostrarPergunta(){

let p=perguntas[atual]

document.getElementById("pergunta").innerText=p.q

let div=document.getElementById("respostas")
div.innerHTML=""

p.a.forEach((txt,i)=>{

let btn=document.createElement("button")
btn.innerText=txt

btn.onclick=function(){

if(i===p.c) pontos++

atual++

if(atual<perguntas.length){
mostrarPergunta()
}else{
document.getElementById("pontuacao").innerText="Pontuação: "+pontos+"/"+perguntas.length
}

}

div.appendChild(btn)

})

}

mostrarPergunta()

//////////////////////////
// ⚖️ DECISÕES
//////////////////////////

let situacoes = [
{
s:"A fábrica ultrapassa 85 dB. O que fazes?",
o:["Ignorar","Reduzir ruído"],
c:1
},
{
s:"Trabalhadores sem proteção.",
o:["Nada","Fornecer proteção"],
c:1
}
]

let si=0
let score=0

function mostrarSit(){

let s=situacoes[si]

document.getElementById("situacao").innerText=s.s

let div=document.getElementById("opcoes")
div.innerHTML=""

s.o.forEach((txt,i)=>{

let btn=document.createElement("button")
btn.innerText=txt

btn.onclick=function(){

if(i===s.c) score++

si++

if(si<situacoes.length){
mostrarSit()
}else{
document.getElementById("resultadoJogo").innerText="Resultado: "+score+"/"+situacoes.length
}

}

div.appendChild(btn)

})

}

mostrarSit()

//////////////////////////
// 🧠 MEMÓRIA
//////////////////////////

function startMem(){

let n=""
for(let i=0;i<5;i++){
n += Math.floor(Math.random()*10)
}

document.getElementById("mem").innerText="Memoriza: "+n

setTimeout(()=>{
let r = prompt("Qual era o número?")
if(r===n){
alert("Correto!")
}else{
alert("Errado! Era "+n)
}
},3000)

}

</script>

<footer>
<p>Jogos educativos sobre sustentabilidade</p>
</footer>

</body>
</html>
